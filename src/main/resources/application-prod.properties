# ── Base de datos PostgreSQL en Supabase / AWS ───────
# URL desde variable de entorno (formato jdbc:postgresql://host:puerto/bd)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate (Postgres) ───────────────────────
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# ── Flyway ───────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.clean-disabled=true

# ── Cache Caffeine ───────────────────────────────────
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=1000,expireAfterWrite=24h

# ── (Monitoreo) ─────────────────────────────
management.endpoints.web.exposure.include=health,info

# ── Seguridad ───────────────────
app.security.admin-user=${ADMIN_USER:admin}
app.security.admin-password=${ADMIN_PASSWORD:changeme_prod}

# ── CORS ─────────────────────────────────────────────
# Solo permitir tu frontend de producción
app.cors.allowed-origins=${FRONTEND_URL:https://el-dominio-de-la-app-del-front.com}

# ── Logging ──────────────────────────────────────────
logging.level.root=WARN
logging.level.com.dmq.picoyplaca=INFO
logging.level.org.springframework.web=WARN
