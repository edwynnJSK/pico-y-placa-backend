# Pico y Placa API — Configuración principal

# ── Perfil activo ────────────────────────────────────
spring.profiles.active=dev

# ── Base de datos H2 (desarrollo) ────────────────────
spring.datasource.url=jdbc:h2:mem:picoyplacadb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── JPA / Hibernate ──────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# Flyway gestiona el schema; Hibernate solo valida
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ── Flyway ───────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false

# ── Cache Caffeine ───────────────────────────────────
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=24h

# ── Jackson / Zona horaria ───────────────────────────
spring.jackson.time-zone=America/Guayaquil
spring.jackson.serialization.write-dates-as-timestamps=false

# ── Actuator ─────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
info.app.name=Pico y Placa API
info.app.version=1.0.0
info.app.normativa=SM-2021-0277

# ── Seguridad — credenciales admin ───────────────────
app.security.admin-user=admin
app.security.admin-password=${ADMIN_PASSWORD:changeme_dev}

# ── CORS ─────────────────────────────────────────────
app.cors.allowed-origins=http://localhost:4200

# ── Normativa ────────────────────────────────────────
app.normativa.resolucion=SM-2021-0277
app.normativa.vigente-desde=2021-12-15
app.normativa.descripcion=Resolución Metropolitana DMQ

# ── Zona horaria ─────────────────────────────────────
app.timezone=America/Guayaquil

# ── Logging ──────────────────────────────────────────
logging.level.com.dmq.picoyplaca=INFO
logging.level.org.flywaydb=INFO
